<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google-site-verification" content="fh-_hB6ke6xEPJBzNtVUDL6hbgzEYKzA_qijcLAvuaw" />
  <title>썸타요 | SsumTayo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6faf9;
      --text: #1a2e2a;
      --muted: #4a6b63;
      --accent: #0d7c6a;
      --line: #c8ddd7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans KR", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      max-width: 40rem;
      margin: 0 auto;
      padding: 4rem 1.5rem 3rem;
      width: 100%;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .en {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 1.75rem;
    }

    .lead {
      font-size: 1.05rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    ul {
      list-style: none;
      border-top: 1px solid var(--line);
      padding-top: 1.25rem;
    }

    li {
      position: relative;
      padding-left: 1.1rem;
      margin-bottom: 0.65rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    footer {
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 2rem 1.5rem 2.5rem;
    }

    .footer-inner {
      max-width: 40rem;
      margin: 0 auto;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.75;
    }

    .footer-inner h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    .footer-inner strong {
      color: var(--text);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>썸타요</h1>
    <p class="en">SsumTayo</p>
    <p class="lead">
      제주를 기반으로 여행과 배움을 연결하고, 앱과 콘텐츠로 더 편한 여행 경험을 준비합니다.
    </p>
    <ul>
      <li>여행교육</li>
      <li>특산물 판매·유통</li>
      <li>앱 개발</li>
    </ul>
  </main>

  <footer>
    <div class="footer-inner">
      <h2>사업자 정보</h2>
      <p><strong>법인명</strong> 주식회사 윤슬같은사람들</p>
      <p><strong>대표자</strong> 윤명희</p>
      <p><strong>사업자등록번호</strong> 520-81-03325</p>
      <p><strong>법인등록번호</strong> 220111-0275587</p>
      <p><strong>개업연월일</strong> 2025년 1월 22일</p>
      <p><strong>사업장 소재지</strong> 제주특별자치도 제주시 연삼로 177, 2층 (오라이동, 광은빌딩)</p>
      <p><strong>업태</strong> 교육서비스업, 도소매업, 정보통신업</p>
      <p><strong>종목</strong> 여행교육, 특산물 판매·유통업, 앱개발</p>
    </div>
  </footer>
</body>
</html>
